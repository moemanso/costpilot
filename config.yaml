# CostPilot Configuration
server:
  port: 3000
  host: "0.0.0.0"

# Authentication
auth:
  type: "api-key"  # or "basic"
  apiKeyHeader: "x-api-key"
  # Generate random keys for production
  validApiKeys:
    - "cpilot_sk_test_123456789"
    - "cpilot_sk_prod_987654321"

# Rate limiting
rateLimit:
  windowMs: 60000  # 1 minute
  maxRequests: 100
  maxTokensPerMinute: 100000

# Budget settings
budget:
  defaultMonthlyLimit: 100  # USD
  warnThreshold: 0.75  # Warn at 75% of budget

# Model routing configuration
routing:
  # Complexity tiers: simple -> complex
  tiers:
    - name: "simple"
      maxTokens: 50
      models:
        - provider: "openai"
          model: "gpt-4o-mini"
          costPer1kInput: 0.00015
          costPer1kOutput: 0.0006
        - provider: "anthropic"
          model: "claude-3-haiku-20240307"
          costPer1kInput: 0.00025
          costPer1kOutput: 0.00125
        - provider: "vercel"
          model: "gpt-4o-mini"
          costPer1kInput: 0.00015
          costPer1kOutput: 0.0006

    - name: "medium"
      maxTokens: 500
      models:
        - provider: "openai"
          model: "gpt-4o"
          costPer1kInput: 0.0025
          costPer1kOutput: 0.01
        - provider: "anthropic"
          model: "claude-3-sonnet-20240229"
          costPer1kInput: 0.003
          costPer1kOutput: 0.015
        - provider: "vercel"
          model: "gpt-4o"
          costPer1kInput: 0.0025
          costPer1kOutput: 0.01

    - name: "complex"
      maxTokens: 999999
      models:
        - provider: "openai"
          model: "gpt-4-turbo"
          costPer1kInput: 0.01
          costPer1kOutput: 0.03
        - provider: "anthropic"
          model: "claude-3-opus-20240229"
          costPer1kInput: 0.015
          costPer1kOutput: 0.075
        - provider: "vercel"
          model: "gpt-4-turbo"
          costPer1kInput: 0.01
          costPer1kOutput: 0.03

  # Provider endpoints
  providers:
    openai:
      baseUrl: "https://api.openai.com/v1"
      defaultHeaders:
        "Content-Type": "application/json"
    anthropic:
      baseUrl: "https://api.anthropic.com/v1"
      defaultHeaders:
        "Content-Type": "application/json"
        "anthropic-version": "2023-06-01"
    vercel:
      baseUrl: "https://gateway.ai.vercel.com/ai/gateway"
      defaultHeaders:
        "Content-Type": "application/json"

# Cache settings
cache:
  enabled: true
  ttlSeconds: 3600  # 1 hour
  maxEntries: 10000
  similarityThreshold: 0.9  # Minimum similarity for cache hit

# Cost tracking
tracking:
  trackPerUser: true
  trackPerProject: true
  trackPerModel: true
  retentionDays: 90

# Logging
logging:
  level: "info"  # debug, info, warn, error
  format: "json"
