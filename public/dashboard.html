<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CostPilot Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.3);
      --success: #3fb950;
      --success-glow: rgba(63, 185, 80, 0.3);
      --warning: #d29922;
      --danger: #f85149;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background: 
        radial-gradient(circle at 20% 20%, rgba(88, 166, 255, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(63, 185, 80, 0.02) 0%, transparent 40%),
        var(--bg);
    }
    
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(8px);
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, #79b8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .logo span { 
      background: linear-gradient(135deg, var(--accent) 0%, var(--success) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav {
      display: flex;
      gap: 1rem;
    }
    
    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .nav a:hover, .nav a.active {
      color: var(--text);
      background: var(--bg-tertiary);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }
    
    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
    }
    
    .stat-value.saved { color: var(--success); }
    .stat-value.warning { color: var(--warning); }
    .stat-value.danger { color: var(--danger); }
    
    .chart-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      transition: all 0.2s ease;
    }

    .chart-section:hover {
      box-shadow: var(--shadow-md);
    }
    
    .chart-section h2 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }
    
    .chart-container {
      height: 300px;
    }
    
    .history-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .history-section h2 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }
    
    .message-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .message-item {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
    }
    
    .message-item:last-child {
      border-bottom: none;
    }
    
    .message-role {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--accent);
      min-width: 60px;
    }
    
    .message-content {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 500px;
    }
    
    .demo-notice {
      background: linear-gradient(135deg, rgba(63, 185, 80, 0.1) 0%, rgba(63, 185, 80, 0.05) 100%);
      border: 1px solid var(--success);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .demo-notice .badge {
      background: linear-gradient(135deg, var(--success) 0%, #7ee787 100%);
      color: var(--bg);
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
      }
      
      .container {
        padding: 1rem;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .chart-container {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🚀 <span>CostPilot</span></div>
    <nav class="nav">
      <a href="/chat">💬 Chat</a>
      <a href="/dashboard" class="active">📊 Dashboard</a>
      <a href="/settings">⚙️ Settings</a>
    </nav>
  </div>
  
  <div class="container">
    <div id="demoNotice" class="demo-notice hidden">
      <span class="badge">DEMO MODE</span>
      <span>You're viewing demo data. Connect your API key for real analytics.</span>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value" id="totalSpent">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Saved</div>
        <div class="stat-value saved" id="totalSaved">$0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Budget</div>
        <div class="stat-value" id="budget">$100</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Budget Used</div>
        <div class="stat-value" id="budgetUsed">0%</div>
      </div>
    </div>
    
    <div class="chart-section">
      <h2>📈 Spending Over Time</h2>
      <div class="chart-container">
        <canvas id="spendingChart"></canvas>
      </div>
    </div>
    
    <div class="chart-section">
      <h2>💰 Savings vs Spending</h2>
      <div class="chart-container">
        <canvas id="savingsChart"></canvas>
      </div>
    </div>
    
    <div class="history-section">
      <h2>💬 Chat History</h2>
      <div class="message-list" id="messageList">
        <p style="color: var(--text-secondary); padding: 1rem;">No chat history yet. Start chatting!</p>
      </div>
    </div>
  </div>

  <script>
    let spendingChart, savingsChart;
    
    async function loadDashboard() {
      const sessionId = getSessionId();
      
      try {
        const res = await fetch(`/api/dashboard/${sessionId}`);
        const data = await res.json();
        
        // Update stats
        document.getElementById('totalSpent').textContent = '$' + (data.totalSpent || 0).toFixed(2);
        document.getElementById('totalSaved').textContent = '$' + (data.totalSaved || 0).toFixed(2);
        document.getElementById('budget').textContent = '$' + (data.budget || 100);
        
        const usedPercent = data.budget > 0 ? Math.round((data.totalSpent / data.budget) * 100) : 0;
        const usedEl = document.getElementById('budgetUsed');
        usedEl.textContent = usedPercent + '%';
        usedEl.className = 'stat-value' + (usedPercent >= 100 ? ' danger' : usedPercent >= 80 ? ' warning' : '');
        
        // Show demo notice
        if (data.isDemo) {
          document.getElementById('demoNotice').classList.remove('hidden');
        }
        
        // Render charts
        renderCharts(data.history || []);
        
        // Render message history
        renderMessages(data.messages || []);
        
      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }
    
    function getSessionId() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('session') || localStorage.getItem('costpilot_session') || 'default';
    }
    
    function renderCharts(history) {
      const labels = history.map(h => h.date.slice(5)); // MM-DD format
      const spentData = history.map(h => h.spent);
      const savedData = history.map(h => h.saved);
      
      // Spending over time chart
      const ctx1 = document.getElementById('spendingChart').getContext('2d');
      if (spendingChart) spendingChart.destroy();
      
      spendingChart = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Cumulative Spent ($)',
            data: spentData,
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88, 166, 255, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#8b949e' } }
          },
          scales: {
            x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } },
            y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
          }
        }
      });
      
      // Savings vs spending chart
      const ctx2 = document.getElementById('savingsChart').getContext('2d');
      if (savingsChart) savingsChart.destroy();
      
      const totalSpent = spentData[spentData.length - 1] || 0;
      const totalSaved = savedData[savedData.length - 1] || 0;
      
      savingsChart = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: ['Total Spent', 'Total Saved'],
          datasets: [{
            data: [totalSpent, totalSaved],
            backgroundColor: ['#f85149', '#3fb950'],
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { ticks: { color: '#8b949e' }, grid: { display: false } },
            y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
          }
        }
      });
    }
    
    function renderMessages(messages) {
      const container = document.getElementById('messageList');
      
      if (!messages.length) {
        container.innerHTML = '<p style="color: var(--text-secondary); padding: 1rem;">No chat history yet. Start chatting!</p>';
        return;
      }
      
      container.innerHTML = messages.map(msg => `
        <div class="message-item">
          <span class="message-role">${msg.role}</span>
          <span class="message-content">${escapeHtml(msg.content)}</span>
        </div>
      `).join('');
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Load on page load
    loadDashboard();
  </script>
</body>
</html>
